# ============================================================
# PPPoker Automation - Configuracion de ejecucion local
# ============================================================
# Este archivo define como correr las pruebas en cualquier
# maquina sin necesidad de CI/CD ni deploy.
#
# Uso:
#   node runner.js
#   node runner.js --suite chipIn
#   node runner.js --suite chipOut
#   node runner.js --suite all
# ============================================================

proyecto: pppoker-automation
version: "1.0"
base_url: https://pokerchipmanager.com

# ── Suites de pruebas ─────────────────────────────────────
suites:
  all:
    descripcion: Corre todos los feature files
    spec: "features/**/*.feature"

  chipIn:
    descripcion: Solo pruebas de chip in
    spec: "features/PPPoker.feature"
    tags: "@chipIn"

  chipOut:
    descripcion: Solo pruebas de chip out
    spec: "features/PPPoker.feature"
    tags: "@chipOut"

  monitor:
    descripcion: Pruebas de monitoreo de la plataforma
    spec: "features/PPPoker.feature"
    tags: "@navegacion or @chipIn or @chipOut"

# ── Configuracion del navegador ───────────────────────────
navegador:
  nombre: chrome
  headless: false        # true para correr sin ventana visible
  maximizado: true
  timeout_elemento: 10000
  timeout_pagina: 60000

# ── Reintentos ────────────────────────────────────────────
reintentos:
  por_spec: 0            # cuantas veces reintentar si falla todo el archivo
  por_step: 0            # cuantas veces reintentar un step fallido

# ── Reporte ───────────────────────────────────────────────
reporte:
  formato: spec          # spec | dot | json
  guardar_logs: false
  carpeta_logs: logs/

# ── Credenciales (usar .env en lugar de escribirlas aqui) ─
credenciales:
  fuente: .env           # las credenciales se leen del archivo .env
  variables:
    email: PPPOKER_EMAIL
    password: PPPOKER_PASSWORD
