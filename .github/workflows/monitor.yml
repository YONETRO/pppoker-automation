name: PPPoker Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # cada 15 minutos
  workflow_dispatch:          # correr manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Correr pruebas de monitoreo
        env:
          PPPOKER_EMAIL: ${{ secrets.PPPOKER_EMAIL }}
          PPPOKER_PASSWORD: ${{ secrets.PPPOKER_PASSWORD }}
          HEADLESS: 'true'
        run: npm test
